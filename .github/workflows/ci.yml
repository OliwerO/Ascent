name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript + Vite build
        run: npm run build

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-key-placeholder
          SUPABASE_SERVICE_KEY: test-key-placeholder
          SLACK_BOT_TOKEN: ""
        run: pytest tests/ -v

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [frontend, python]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Post failure to Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_CI_WEBHOOK }}
        if: env.SLACK_WEBHOOK != ''
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"CI failed on main\\n*Commit:* <${COMMIT_URL}|${COMMIT_MSG}>\\n*Run:* <${RUN_URL}|View logs>\"}"
