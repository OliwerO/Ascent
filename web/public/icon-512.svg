<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141418"/>
      <stop offset="100%" stop-color="#0c0c10"/>
    </linearGradient>
    <linearGradient id="peak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="peak2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Rear mountain (subtle) -->
  <polygon points="320,160 460,380 180,380" fill="url(#peak2)"/>
  <!-- Main mountain peak -->
  <polygon points="200,130 370,380 30,380" fill="url(#peak)"/>
  <!-- Snow cap accent -->
  <polygon points="200,130 228,175 172,175" fill="#ececf0" opacity="0.9"/>
  <!-- Subtle horizon line -->
  <line x1="30" y1="380" x2="482" y2="380" stroke="#34d399" stroke-width="2" opacity="0.3"/>
</svg>
